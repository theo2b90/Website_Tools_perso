
<!DOCTYPE html>
<html lang="fr">
<head>
                <!-- Favicon trousse à outils -->
                <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23764ba2'/%3E%3Cpath d='M8 18v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2h1a1 1 0 0 1 1 1v5a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-5a1 1 0 0 1 1-1h1zm2-2v2h12v-2a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1zm2 4a1 1 0 1 0 0 2h8a1 1 0 1 0 0-2h-8z' fill='white'/%3E%3C/svg%3E'>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tirage Aléatoire de Jeux</title>
        <style>
                * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                }
                
                body {
                        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        min-height: 100vh;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        padding: 20px;
                }
                
                .container {
                        text-align: center;
                        background: white;
                        padding: 40px 20px;
                        border-radius: 15px;
                        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
                        max-width: 600px;
                        width: 100%;
                }
                
                h1 {
                        color: #333;
                        margin-bottom: 30px;
                        font-size: 2em;
                }

                .draw-note {
                        color: #555;
                        font-size: 0.95em;
                        margin-top: -14px;
                        margin-bottom: 18px;
                }

                .draw-note strong {
                        color: #2d3436;
                }

                .search-section {
                        margin: 0 auto 20px;
                        max-width: 520px;
                        text-align: left;
                }

                .search-label {
                        display: block;
                        color: #2d3436;
                        font-size: 0.9em;
                        font-weight: 600;
                        margin-bottom: 8px;
                }

                .search-input {
                        width: 100%;
                        border: 2px solid #dfe6e9;
                        border-radius: 12px;
                        padding: 12px 14px;
                        font-size: 1em;
                        transition: border-color 0.2s ease, box-shadow 0.2s ease;
                }

                .search-input:focus {
                        outline: none;
                        border-color: #667eea;
                        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
                }

                .search-result {
                        min-height: 22px;
                        margin-top: 8px;
                        color: #636e72;
                        font-size: 0.9em;
                }

                .search-section.completed {
                        margin-top: -6px;
                        margin-bottom: 24px;
                }

                .manage-section {
                        margin: 0 auto 26px;
                        max-width: 520px;
                        text-align: left;
                        border: 1px solid #d7dbe2;
                        border-radius: 14px;
                        padding: 14px;
                        background: linear-gradient(180deg, #fcfdff 0%, #f4f7ff 100%);
                        box-shadow: 0 4px 14px rgba(31, 41, 55, 0.08);
                }

                .manage-row {
                        display: grid;
                        grid-template-columns: 1fr 1fr;
                        gap: 10px;
                        margin-bottom: 10px;
                }

                .manage-select {
                        width: 100%;
                        border: 2px solid #dfe6e9;
                        border-radius: 10px;
                        padding: 10px 12px;
                        font-size: 0.95em;
                        background: #fff;
                }

                .manage-actions {
                        display: flex;
                        flex-wrap: wrap;
                        gap: 8px;
                        margin-top: 10px;
                }

                .manage-actions button {
                        padding: 8px 12px;
                        border-radius: 9px;
                        font-size: 0.9em;
                        border: none;
                        color: #fff;
                        font-weight: 600;
                        cursor: pointer;
                        transition: transform 0.15s ease, opacity 0.15s ease;
                }

                .manage-actions button:hover {
                        transform: translateY(-1px);
                        opacity: 0.95;
                }

                .manage-actions button:active {
                        transform: translateY(0);
                }

                .btn-secondary {
                        background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
                }

                .btn-warn {
                        background: linear-gradient(135deg, #f39c12 0%, #d35400 100%);
                }

                .btn-danger {
                        background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
                }

                .manage-status {
                        min-height: 20px;
                        margin-top: 8px;
                        font-size: 0.9em;
                        color: #2d3436;
                }
                
                .games-grid {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                        gap: 20px;
                        margin: 30px 0;
                }
                .flip-card {
                        background: transparent;
                        width: 100%;
                        height: 120px;
                        perspective: 700px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                }
                .flip-card-inner {
                        position: relative;
                        width: 100%;
                        height: 100%;
                        transition: transform 0.6s cubic-bezier(.4,2,.6,1);
                        transform-style: preserve-3d;
                }
                .flip-card.flipped .flip-card-inner {
                        transform: rotateY(180deg);
                }
                .flip-card-front, .flip-card-back {
                        position: absolute;
                        width: 100%;
                        height: 100%;
                        backface-visibility: hidden;
                        border-radius: 10px;
                        top: 0;
                        left: 0;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                }
                .flip-card-front {
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        font-size: 1.2em;
                        font-weight: bold;
                        letter-spacing: 0.5px;
                        text-align: center;
                }
                .flip-card-back {
                        background: white;
                        color: #333;
                        font-size: 1.1em;
                        font-weight: bold;
                        text-align: center;
                        transform: rotateY(180deg);
                        padding: 0 8px;
                        transition: background 0.4s;
                }
                .flip-card-back.red {
                        background: linear-gradient(135deg, #e74c3c 0%, #ff7675 100%);
                        color: white;
                }
                .flip-card-back.yellow {
                        background: linear-gradient(135deg, #f1c40f 0%, #ffeaa7 100%);
                        color: #333;
                }
                .flip-card-back.green {
                        background: linear-gradient(135deg, #27ae60 0%, #81ecec 100%);
                        color: white;
                }

                /* Bloc indé: style volontairement à part pour le mettre en avant */
                .flip-card.indie-card {
                        filter: drop-shadow(0 8px 16px rgba(17, 24, 39, 0.35));
                }

                .flip-card-front.indie-front {
                        background:
                                radial-gradient(circle at 20% 20%, rgba(255, 251, 235, 0.35), transparent 45%),
                                linear-gradient(140deg, #0f172a 0%, #1f2937 55%, #111827 100%);
                        color: #fde68a;
                        border: 2px solid #f59e0b;
                        text-transform: uppercase;
                        letter-spacing: 1.4px;
                        font-size: 1.05em;
                }

                .flip-card-back.indie {
                        background:
                                repeating-linear-gradient(
                                        135deg,
                                        rgba(245, 158, 11, 0.18) 0,
                                        rgba(245, 158, 11, 0.18) 8px,
                                        rgba(17, 24, 39, 0.85) 8px,
                                        rgba(17, 24, 39, 0.85) 16px
                                ),
                                linear-gradient(135deg, #111827 0%, #0f172a 100%);
                        color: #fffbeb;
                        border: 2px solid #fbbf24;
                        box-shadow:
                                0 0 0 2px rgba(17, 24, 39, 0.55) inset,
                                0 0 24px rgba(245, 158, 11, 0.45);
                        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55);
                }
                
                #drawBtn {
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        border: none;
                        padding: 15px 40px;
                        font-size: 1.1em;
                        border-radius: 50px;
                        cursor: pointer;
                        transition: transform 0.2s ease;
                        font-weight: bold;
                }
                
                #drawBtn:hover {
                        transform: scale(1.05);
                }
                
                #drawBtn:active {
                        transform: scale(0.95);
                }
                
                @media (max-width: 600px) {
                        .container {
                                padding: 20px;
                        }
                        
                        h1 {
                                font-size: 1.5em;
                        }
                        
                        .games-grid {
                                grid-template-columns: 1fr;
                        }

                        .manage-row {
                                grid-template-columns: 1fr;
                        }
                }
        </style>
</head>
<body>
        <div class="container">
                <h1>🎮 Tirage Aléatoire</h1>
                <p class="draw-note"><strong>Règle :</strong> 3 jeux principaux + 1 jeu indé</p>
                <div class="search-section">
                        <label class="search-label" for="gameSearch">Rechercher un jeu</label>
                        <input class="search-input" id="gameSearch" list="gamesDatalist" placeholder="Ex: Machinarium, Elden ring...">
                        <datalist id="gamesDatalist"></datalist>
                        <div class="search-result" id="searchResult"></div>
                </div>
                <div class="search-section completed">
                        <label class="search-label" for="completedSearch">Rechercher un jeu terminé</label>
                        <input class="search-input" id="completedSearch" list="completedDatalist" placeholder="Ex: GTA V, Witcher 3...">
                        <datalist id="completedDatalist"></datalist>
                        <div class="search-result" id="completedSearchResult"></div>
                </div>
                <div class="manage-section">
                        <label class="search-label" for="manageCategory">Gérer la bibliothèque</label>
                        <div class="manage-row">
                                <select class="manage-select" id="manageCategory"></select>
                                <input class="search-input" id="manageGameInput" list="manageGamesDatalist" placeholder="Nom exact du jeu">
                        </div>
                        <datalist id="manageGamesDatalist"></datalist>
                        <div class="manage-actions">
                                <button class="btn-secondary" id="addGameBtn" type="button">Ajouter</button>
                                <button class="btn-danger" id="deleteGameBtn" type="button">Supprimer</button>
                                <button class="btn-warn" id="markCompletedBtn" type="button">Déplacer vers Terminé</button>
                                <button class="btn-secondary" id="exportJsonBtn" type="button">Exporter JSON</button>
                                <button class="btn-secondary" id="resetLocalBtn" type="button">Recharger depuis fichier</button>
                        </div>
                        <div class="manage-status" id="manageStatus"></div>
                </div>
                <div class="games-grid" id="gamesContainer"></div>
                <button id="drawBtn">Tirer 4 Jeux</button>
        </div>
        
        <script>
const GAME_DATA_URL = './games.json';
const LOCAL_STORAGE_KEY = 'games_data_v2';

let dataModel = { categories: [] };
let games = [];
let mainDrawGames = [];
let indieGames = [];
let completedGames = [];
let flipped = false;

function normalizeGames(list, genre) {
        return list
                .map(name => String(name).trim())
                .filter(Boolean)
                .map(name => ({ name, genre, subGenre: '' }));
}

function isValidModel(model) {
        return !!model && Array.isArray(model.categories);
}

function buildGamesFromModel() {
        games = [];
        mainDrawGames = [];
        indieGames = [];
        completedGames = [];

        for (const category of dataModel.categories) {
                const names = Array.isArray(category.games) ? category.games : [];
                const genreLabel = category.label || 'Principal';
                const normalized = normalizeGames(names, genreLabel);

                games.push(...normalized);

                if (category.type === 'completed') {
                        completedGames.push(...normalized);
                } else if (category.type === 'indie') {
                        indieGames.push(...normalized);
                } else {
                        mainDrawGames.push(...normalized);
                }
        }
}

function saveLocalModel() {
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(dataModel));
}

function getCategoryById(categoryId) {
        return dataModel.categories.find(category => category.id === categoryId) || null;
}

function getCompletedCategory() {
        return dataModel.categories.find(category => category.type === 'completed') || null;
}

function refreshAllFromModel() {
        buildGamesFromModel();
        initGameSearch();
        initManagePanel();
}

function showManageStatus(message, isError) {
        const manageStatus = document.getElementById('manageStatus');
        if (!manageStatus) {
                return;
        }

        manageStatus.textContent = message;
        manageStatus.style.color = isError ? '#c0392b' : '#1e8449';
}

function normalizeName(text) {
        return String(text || '').trim().toLowerCase();
}

function findGameIndex(gamesList, gameName) {
        const target = normalizeName(gameName);
        return gamesList.findIndex(item => normalizeName(item) === target);
}

async function loadGamesData() {
        const drawBtn = document.getElementById('drawBtn');
        const localRaw = localStorage.getItem(LOCAL_STORAGE_KEY);

        try {
                const response = await fetch(GAME_DATA_URL, { cache: 'no-store' });
                if (!response.ok) {
                        throw new Error(`Impossible de charger ${GAME_DATA_URL} (${response.status})`);
                }

                const data = await response.json();
                if (!isValidModel(data)) {
                        throw new Error('Format JSON invalide: categories manquantes.');
                }

                if (localRaw) {
                        try {
                                const localModel = JSON.parse(localRaw);
                                dataModel = isValidModel(localModel) ? localModel : data;
                        } catch {
                                dataModel = data;
                        }
                } else {
                        dataModel = data;
                }

                refreshAllFromModel();

                return true;
        } catch (error) {
                console.error(error);

                if (localRaw) {
                        try {
                                const localModel = JSON.parse(localRaw);
                                if (isValidModel(localModel) && localModel.categories.length > 0) {
                                        dataModel = localModel;
                                        refreshAllFromModel();
                                        showManageStatus('Mode local: données chargées depuis la sauvegarde navigateur.', false);
                                        return true;
                                }
                        } catch {
                                // Ignore local fallback parse errors
                        }
                }

                if (drawBtn) {
                        drawBtn.disabled = true;
                        drawBtn.textContent = 'Erreur de chargement';
                }
                const searchResult = document.getElementById('searchResult');
                if (searchResult) {
                        searchResult.textContent = 'Impossible de charger games.json. En local: lance un serveur web ou utilise d\'abord une sauvegarde locale.';
                }

                initManagePanel();
                showManageStatus('Aucune donnée disponible. Vérifie games.json ou lance la page via serveur.', true);
                return false;
        }
}

function initGameSearch() {
        const datalist = document.getElementById('gamesDatalist');
        const searchInput = document.getElementById('gameSearch');
        const searchResult = document.getElementById('searchResult');
        const completedDatalist = document.getElementById('completedDatalist');
        const completedSearchInput = document.getElementById('completedSearch');
        const completedSearchResult = document.getElementById('completedSearchResult');
        const manageDatalist = document.getElementById('manageGamesDatalist');

        if (!datalist || !searchInput || !searchResult || !completedDatalist || !completedSearchInput || !completedSearchResult) {
                return;
        }

        datalist.innerHTML = games
                .map(game => game.name)
                .slice()
                .sort((a, b) => a.localeCompare(b, 'fr'))
                .map(name => `<option value="${name.replace(/"/g, '&quot;')}"></option>`)
                .join('');

        completedDatalist.innerHTML = completedGames
                .map(game => game.name)
                .slice()
                .sort((a, b) => a.localeCompare(b, 'fr'))
                .map(name => `<option value="${name.replace(/"/g, '&quot;')}"></option>`)
                .join('');

        if (manageDatalist) {
                manageDatalist.innerHTML = games
                        .map(game => game.name)
                        .slice()
                        .sort((a, b) => a.localeCompare(b, 'fr'))
                        .map(name => `<option value="${name.replace(/"/g, '&quot;')}"></option>`)
                        .join('');
        }

        const updateSearchResult = () => {
                const term = searchInput.value.trim().toLowerCase();
                if (!term) {
                        searchResult.textContent = '';
                        return;
                }

                const match = games.find(game => game.name.toLowerCase() === term);
                if (!match) {
                        searchResult.textContent = 'Jeu introuvable dans la liste.';
                        return;
                }

                const section = match.genre || 'Principal';

                searchResult.textContent = `Trouve: ${match.name} | Section: ${section}`;
        };

        searchInput.oninput = updateSearchResult;
        searchInput.onchange = updateSearchResult;

        const updateCompletedSearchResult = () => {
                const term = completedSearchInput.value.trim().toLowerCase();
                if (!term) {
                        completedSearchResult.textContent = '';
                        return;
                }

                const match = completedGames.find(game => game.name.toLowerCase() === term);
                if (!match) {
                        completedSearchResult.textContent = 'Jeu introuvable dans la section Terminé ; Completionniste.';
                        return;
                }

                completedSearchResult.textContent = `Trouve: ${match.name} | Section: Termine ; Completionniste`;
        };

        completedSearchInput.oninput = updateCompletedSearchResult;
        completedSearchInput.onchange = updateCompletedSearchResult;
}

function updateManageGamesList() {
        const select = document.getElementById('manageCategory');
        const manageDatalist = document.getElementById('manageGamesDatalist');
        if (!select || !manageDatalist) {
                return;
        }

        const category = getCategoryById(select.value);
        if (!category) {
                manageDatalist.innerHTML = '';
                return;
        }

        manageDatalist.innerHTML = category.games
                .slice()
                .sort((a, b) => a.localeCompare(b, 'fr'))
                .map(name => `<option value="${name.replace(/"/g, '&quot;')}"></option>`)
                .join('');
}

function initManagePanel() {
        const select = document.getElementById('manageCategory');
        if (!select) {
                return;
        }

        if (!Array.isArray(dataModel.categories) || dataModel.categories.length === 0) {
                select.innerHTML = '<option value="">Aucune catégorie disponible</option>';
                return;
        }

        const previousValue = select.value;
        select.innerHTML = dataModel.categories
                .map(category => `<option value="${category.id}">${category.label}</option>`)
                .join('');

        if (previousValue && getCategoryById(previousValue)) {
                select.value = previousValue;
        }

        select.onchange = updateManageGamesList;
        updateManageGamesList();
}

function addGameToCategory() {
        const select = document.getElementById('manageCategory');
        const input = document.getElementById('manageGameInput');
        if (!select || !input) {
                return;
        }

        const category = getCategoryById(select.value);
        const gameName = input.value.trim();
        if (!category || !gameName) {
                showManageStatus('Choisis une catégorie et un nom de jeu.', true);
                return;
        }

        if (findGameIndex(category.games, gameName) !== -1) {
                        showManageStatus('Ce jeu existe déjà dans cette catégorie.', true);
                return;
        }

        category.games.push(gameName);
        saveLocalModel();
        refreshAllFromModel();
        input.value = '';
        showManageStatus(`Ajouté dans ${category.label}.`, false);
}

function deleteGameFromCategory() {
        const select = document.getElementById('manageCategory');
        const input = document.getElementById('manageGameInput');
        if (!select || !input) {
                return;
        }

        const category = getCategoryById(select.value);
        const gameName = input.value.trim();
        if (!category || !gameName) {
                showManageStatus('Choisis une catégorie et un nom de jeu.', true);
                return;
        }

        const index = findGameIndex(category.games, gameName);
        if (index === -1) {
                showManageStatus('Jeu introuvable dans la catégorie sélectionnée.', true);
                return;
        }

        category.games.splice(index, 1);
        saveLocalModel();
        refreshAllFromModel();
        input.value = '';
        showManageStatus(`Supprimé de ${category.label}.`, false);
}

function moveGameToCompleted() {
        const select = document.getElementById('manageCategory');
        const input = document.getElementById('manageGameInput');
        if (!select || !input) {
                return;
        }

        const sourceCategory = getCategoryById(select.value);
        const completedCategory = getCompletedCategory();
        const gameName = input.value.trim();

        if (!sourceCategory || !completedCategory || !gameName) {
                showManageStatus('Action impossible: catégorie source/terminée manquante ou nom vide.', true);
                return;
        }

        if (sourceCategory.id === completedCategory.id) {
                showManageStatus('Le jeu est déjà dans Terminé ; Completionniste.', true);
                return;
        }

        const sourceIndex = findGameIndex(sourceCategory.games, gameName);
        if (sourceIndex === -1) {
                showManageStatus('Jeu introuvable dans la catégorie source.', true);
                return;
        }

        const existingInCompleted = findGameIndex(completedCategory.games, gameName);
        if (existingInCompleted === -1) {
                completedCategory.games.push(sourceCategory.games[sourceIndex]);
        }
        sourceCategory.games.splice(sourceIndex, 1);

        saveLocalModel();
        refreshAllFromModel();
        input.value = '';
        showManageStatus('Jeu déplacé vers Terminé ; Completionniste.', false);
}

function exportCurrentJson() {
        const blob = new Blob([JSON.stringify(dataModel, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'games.json';
        link.click();
        URL.revokeObjectURL(url);
        showManageStatus('Export JSON téléchargé.', false);
}

async function resetFromFile() {
        localStorage.removeItem(LOCAL_STORAGE_KEY);
        const loaded = await loadGamesData();
        if (loaded) {
                showManageStatus('Données rechargées depuis games.json.', false);
        }
}

function bindManageActions() {
        const addBtn = document.getElementById('addGameBtn');
        const deleteBtn = document.getElementById('deleteGameBtn');
        const moveBtn = document.getElementById('markCompletedBtn');
        const exportBtn = document.getElementById('exportJsonBtn');
        const resetBtn = document.getElementById('resetLocalBtn');

        if (addBtn) {
                addBtn.onclick = addGameToCategory;
        }
        if (deleteBtn) {
                deleteBtn.onclick = deleteGameFromCategory;
        }
        if (moveBtn) {
                moveBtn.onclick = moveGameToCompleted;
        }
        if (exportBtn) {
                exportBtn.onclick = exportCurrentJson;
        }
        if (resetBtn) {
                resetBtn.onclick = resetFromFile;
        }
}

function showEmptyCards() {
        const container = document.getElementById('gamesContainer');
        container.innerHTML = '';
        container.innerHTML = `
                <div class="flip-card" id="flipCard0">
                        <div class="flip-card-inner">
                                <div class="flip-card-front">?</div>
                                <div class="flip-card-back"></div>
                        </div>
                </div>
                <div class="flip-card" id="flipCard1">
                        <div class="flip-card-inner">
                                <div class="flip-card-front">?</div>
                                <div class="flip-card-back"></div>
                        </div>
                </div>
                <div class="flip-card" id="flipCard2">
                        <div class="flip-card-inner">
                                <div class="flip-card-front">?</div>
                                <div class="flip-card-back"></div>
                        </div>
                </div>
                <div class="flip-card indie-card" id="flipCardInde">
                        <div class="flip-card-inner">
                                <div class="flip-card-front indie-front">Mode Indé</div>
                                <div class="flip-card-back"></div>
                        </div>
                </div>
        `;
}

function drawGames() {
        if (!flipped) {
                if (mainDrawGames.length < 3 || indieGames.length === 0) {
                        alert('Pas assez de jeux pour effectuer le tirage.');
                        return;
                }

                // Tirage et affichage
                const selected = [];
                const gamesCopy = [...mainDrawGames];
                for (let i = 0; i < 3; i++) {
                        const randomIndex = Math.floor(Math.random() * gamesCopy.length);
                        selected.push(gamesCopy[randomIndex]);
                        gamesCopy.splice(randomIndex, 1);
                }

                const indieSelected = indieGames[Math.floor(Math.random() * indieGames.length)];

                // Couleurs à attribuer
                const colors = ['red', 'yellow', 'green'];
                // Mélange aléatoire
                for (let i = colors.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [colors[i], colors[j]] = [colors[j], colors[i]];
                }
                for (let i = 0; i < 3; i++) {
                        const card = document.getElementById('flipCard'+i);
                        if (card) {
                                card.classList.add('flipped');
                                const back = card.querySelector('.flip-card-back');
                                back.className = 'flip-card-back ' + colors[i];
                                back.innerHTML = `
                                        <div>${selected[i].name}</div>
                                        <div style="font-size:0.9em;font-weight:normal;margin-top:6px;">
                                                <em>${selected[i].genre}${selected[i].subGenre ? ' - ' + selected[i].subGenre : ''}</em>
                                        </div>
                                `;
                        }
                }

                const indieCard = document.getElementById('flipCardInde');
                if (indieCard) {
                        indieCard.classList.add('flipped');
                        const back = indieCard.querySelector('.flip-card-back');
                        back.className = 'flip-card-back indie';
                        back.innerHTML = `
                                <div>${indieSelected.name}</div>
                                <div style="font-size:0.9em;font-weight:normal;margin-top:6px;">
                                        <em>Inde ; autre</em>
                                </div>
                        `;
                }

                flipped = true;
                document.getElementById('drawBtn').textContent = 'Réinitialiser';
        } else {
                // Réinitialise
                const cardIds = ['flipCard0', 'flipCard1', 'flipCard2', 'flipCardInde'];
                for (const cardId of cardIds) {
                        const card = document.getElementById(cardId);
                        if (card) {
                                card.classList.remove('flipped');
                                const back = card.querySelector('.flip-card-back');
                                back.className = 'flip-card-back';
                                back.innerHTML = '';
                        }
                }
                flipped = false;
                document.getElementById('drawBtn').textContent = 'Tirer 4 Jeux';
        }
}

async function initApp() {
        const drawBtn = document.getElementById('drawBtn');
        if (drawBtn) {
                drawBtn.disabled = true;
                drawBtn.textContent = 'Chargement...';
                drawBtn.addEventListener('click', drawGames);
        }

        showEmptyCards();
        const loaded = await loadGamesData();
        if (!loaded) {
                return;
        }

        bindManageActions();
        if (drawBtn) {
                drawBtn.disabled = false;
                drawBtn.textContent = 'Tirer 4 Jeux';
        }
}

initApp();
        </script>
</body>
</html>
