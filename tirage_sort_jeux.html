<html lang="fr">
<head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tirage Aléatoire de Jeux</title>
        <style>
                * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                }
                
                body {
                        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        min-height: 100vh;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        padding: 20px;
                }
                
                .container {
                        text-align: center;
                        background: white;
                        padding: 40px 20px;
                        border-radius: 15px;
                        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
                        max-width: 600px;
                        width: 100%;
                }
                
                h1 {
                        color: #333;
                        margin-bottom: 30px;
                        font-size: 2em;
                }

                .draw-note {
                        color: #555;
                        font-size: 0.95em;
                        margin-top: -14px;
                        margin-bottom: 18px;
                }

                .draw-note strong {
                        color: #2d3436;
                }

                .search-section {
                        margin: 0 auto 20px;
                        max-width: 520px;
                        text-align: left;
                }

                .search-label {
                        display: block;
                        color: #2d3436;
                        font-size: 0.9em;
                        font-weight: 600;
                        margin-bottom: 8px;
                }

                .search-input {
                        width: 100%;
                        border: 2px solid #dfe6e9;
                        border-radius: 12px;
                        padding: 12px 14px;
                        font-size: 1em;
                        transition: border-color 0.2s ease, box-shadow 0.2s ease;
                }

                .search-input:focus {
                        outline: none;
                        border-color: #667eea;
                        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
                }

                .search-result {
                        min-height: 22px;
                        margin-top: 8px;
                        color: #636e72;
                        font-size: 0.9em;
                }

                .search-section.completed {
                        margin-top: -6px;
                        margin-bottom: 24px;
                }
                
                .games-grid {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                        gap: 20px;
                        margin: 30px 0;
                }
                .flip-card {
                        background: transparent;
                        width: 100%;
                        height: 120px;
                        perspective: 700px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                }
                .flip-card-inner {
                        position: relative;
                        width: 100%;
                        height: 100%;
                        transition: transform 0.6s cubic-bezier(.4,2,.6,1);
                        transform-style: preserve-3d;
                }
                .flip-card.flipped .flip-card-inner {
                        transform: rotateY(180deg);
                }
                .flip-card-front, .flip-card-back {
                        position: absolute;
                        width: 100%;
                        height: 100%;
                        backface-visibility: hidden;
                        border-radius: 10px;
                        top: 0;
                        left: 0;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                }
                .flip-card-front {
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        font-size: 1.2em;
                        font-weight: bold;
                        letter-spacing: 0.5px;
                        text-align: center;
                }
                .flip-card-back {
                        background: white;
                        color: #333;
                        font-size: 1.1em;
                        font-weight: bold;
                        text-align: center;
                        transform: rotateY(180deg);
                        padding: 0 8px;
                        transition: background 0.4s;
                }
                .flip-card-back.red {
                        background: linear-gradient(135deg, #e74c3c 0%, #ff7675 100%);
                        color: white;
                }
                .flip-card-back.yellow {
                        background: linear-gradient(135deg, #f1c40f 0%, #ffeaa7 100%);
                        color: #333;
                }
                .flip-card-back.green {
                        background: linear-gradient(135deg, #27ae60 0%, #81ecec 100%);
                        color: white;
                }
                
                button {
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        border: none;
                        padding: 15px 40px;
                        font-size: 1.1em;
                        border-radius: 50px;
                        cursor: pointer;
                        transition: transform 0.2s ease;
                        font-weight: bold;
                }
                
                button:hover {
                        transform: scale(1.05);
                }
                
                button:active {
                        transform: scale(0.95);
                }
                
                @media (max-width: 600px) {
                        .container {
                                padding: 20px;
                        }
                        
                        h1 {
                                font-size: 1.5em;
                        }
                        
                        .games-grid {
                                grid-template-columns: 1fr;
                        }
                }
        </style>
</head>
<body>
        <div class="container">
                <h1>🎮 Tirage Aléatoire</h1>
                <p class="draw-note"><strong>Règle :</strong> 3 jeux principaux + 1 jeu indé</p>
                <div class="search-section">
                        <label class="search-label" for="gameSearch">Rechercher un jeu</label>
                        <input class="search-input" id="gameSearch" list="gamesDatalist" placeholder="Ex: Machinarium, Elden ring...">
                        <datalist id="gamesDatalist"></datalist>
                        <div class="search-result" id="searchResult"></div>
                </div>
                <div class="search-section completed">
                        <label class="search-label" for="completedSearch">Rechercher un jeu terminé</label>
                        <input class="search-input" id="completedSearch" list="completedDatalist" placeholder="Ex: GTA V, Witcher 3...">
                        <datalist id="completedDatalist"></datalist>
                        <div class="search-result" id="completedSearchResult"></div>
                </div>
                <div class="games-grid" id="gamesContainer"></div>
                <button id="drawBtn">Tirer 4 Jeux</button>
        </div>
        
        <script>

];

const indieStartName = 'Ades (DD1)';
const completedStartName = 'GTA V (DD1)';
const indieStartIndex = gamesRaw.indexOf(indieStartName);
const completedStartIndex = gamesRaw.indexOf(completedStartName);

const games = gamesRaw.map((line, index) => {
        const trimmed = line.trim();
        let genre = '';

        if (indieStartIndex !== -1 && completedStartIndex !== -1 && index >= indieStartIndex && index < completedStartIndex) {
                genre = 'Inde ; autre';
        } else if (completedStartIndex !== -1 && index >= completedStartIndex) {
                genre = 'Termine ; Completionniste';
        }

        return {
                name: trimmed,
                genre,
                subGenre: ''
        };
});

const excludedGenres = new Set(['Inde ; autre', 'Termine ; Completionniste']);
const mainDrawGames = games.filter(game => !excludedGenres.has(game.genre));
const indieGames = games.filter(game => game.genre === 'Inde ; autre');
const completedGames = games.filter(game => game.genre === 'Termine ; Completionniste');

function initGameSearch() {
        const datalist = document.getElementById('gamesDatalist');
        const searchInput = document.getElementById('gameSearch');
        const searchResult = document.getElementById('searchResult');
        const completedDatalist = document.getElementById('completedDatalist');
        const completedSearchInput = document.getElementById('completedSearch');
        const completedSearchResult = document.getElementById('completedSearchResult');

        if (!datalist || !searchInput || !searchResult || !completedDatalist || !completedSearchInput || !completedSearchResult) {
                return;
        }

        datalist.innerHTML = gamesRaw
                .slice()
                .sort((a, b) => a.localeCompare(b, 'fr'))
                .map(name => `<option value="${name.replace(/"/g, '&quot;')}"></option>`)
                .join('');

        completedDatalist.innerHTML = completedGames
                .map(game => game.name)
                .slice()
                .sort((a, b) => a.localeCompare(b, 'fr'))
                .map(name => `<option value="${name.replace(/"/g, '&quot;')}"></option>`)
                .join('');

        const updateSearchResult = () => {
                const term = searchInput.value.trim().toLowerCase();
                if (!term) {
                        searchResult.textContent = '';
                        return;
                }

                const match = games.find(game => game.name.toLowerCase() === term);
                if (!match) {
                        searchResult.textContent = 'Jeu introuvable dans la liste.';
                        return;
                }

                let section = 'Principal';
                if (match.genre === 'Inde ; autre') {
                        section = 'Inde ; autre';
                } else if (match.genre === 'Termine ; Completionniste') {
                        section = 'Termine ; Completionniste';
                }

                searchResult.textContent = `Trouve: ${match.name} | Section: ${section}`;
        };

        searchInput.addEventListener('input', updateSearchResult);
        searchInput.addEventListener('change', updateSearchResult);

        const updateCompletedSearchResult = () => {
                const term = completedSearchInput.value.trim().toLowerCase();
                if (!term) {
                        completedSearchResult.textContent = '';
                        return;
                }

                const match = completedGames.find(game => game.name.toLowerCase() === term);
                if (!match) {
                        completedSearchResult.textContent = 'Jeu introuvable dans la section Terminé ; Completionniste.';
                        return;
                }

                completedSearchResult.textContent = `Trouve: ${match.name} | Section: Termine ; Completionniste`;
        };

        completedSearchInput.addEventListener('input', updateCompletedSearchResult);
        completedSearchInput.addEventListener('change', updateCompletedSearchResult);
}
                
let flipped = false;

function showEmptyCards() {
        const container = document.getElementById('gamesContainer');
        container.innerHTML = '';
        container.innerHTML = `
                <div class="flip-card" id="flipCard0">
                        <div class="flip-card-inner">
                                <div class="flip-card-front">?</div>
                                <div class="flip-card-back"></div>
                        </div>
                </div>
                <div class="flip-card" id="flipCard1">
                        <div class="flip-card-inner">
                                <div class="flip-card-front">?</div>
                                <div class="flip-card-back"></div>
                        </div>
                </div>
                <div class="flip-card" id="flipCard2">
                        <div class="flip-card-inner">
                                <div class="flip-card-front">?</div>
                                <div class="flip-card-back"></div>
                        </div>
                </div>
                <div class="flip-card" id="flipCardInde">
                        <div class="flip-card-inner">
                                <div class="flip-card-front">Inde</div>
                                <div class="flip-card-back"></div>
                        </div>
                </div>
        `;
}

function drawGames() {
        if (!flipped) {
                if (mainDrawGames.length < 3 || indieGames.length === 0) {
                        alert('Pas assez de jeux pour effectuer le tirage.');
                        return;
                }

                // Tirage et affichage
                const selected = [];
                const gamesCopy = [...mainDrawGames];
                for (let i = 0; i < 3; i++) {
                        const randomIndex = Math.floor(Math.random() * gamesCopy.length);
                        selected.push(gamesCopy[randomIndex]);
                        gamesCopy.splice(randomIndex, 1);
                }

                const indieSelected = indieGames[Math.floor(Math.random() * indieGames.length)];

                // Couleurs à attribuer
                const colors = ['red', 'yellow', 'green'];
                // Mélange aléatoire
                for (let i = colors.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [colors[i], colors[j]] = [colors[j], colors[i]];
                }
                for (let i = 0; i < 3; i++) {
                        const card = document.getElementById('flipCard'+i);
                        if (card) {
                                card.classList.add('flipped');
                                const back = card.querySelector('.flip-card-back');
                                back.className = 'flip-card-back ' + colors[i];
                                back.innerHTML = `
                                        <div>${selected[i].name}</div>
                                        <div style="font-size:0.9em;font-weight:normal;margin-top:6px;">
                                                <em>${selected[i].genre}${selected[i].subGenre ? ' - ' + selected[i].subGenre : ''}</em>
                                        </div>
                                `;
                        }
                }

                const indieCard = document.getElementById('flipCardInde');
                if (indieCard) {
                        indieCard.classList.add('flipped');
                        const back = indieCard.querySelector('.flip-card-back');
                        back.className = 'flip-card-back yellow';
                        back.innerHTML = `
                                <div>${indieSelected.name}</div>
                                <div style="font-size:0.9em;font-weight:normal;margin-top:6px;">
                                        <em>Inde ; autre</em>
                                </div>
                        `;
                }

                flipped = true;
                document.getElementById('drawBtn').textContent = 'Réinitialiser';
        } else {
                // Réinitialise
                const cardIds = ['flipCard0', 'flipCard1', 'flipCard2', 'flipCardInde'];
                for (const cardId of cardIds) {
                        const card = document.getElementById(cardId);
                        if (card) {
                                card.classList.remove('flipped');
                                const back = card.querySelector('.flip-card-back');
                                back.className = 'flip-card-back';
                                back.innerHTML = '';
                        }
                }
                flipped = false;
                document.getElementById('drawBtn').textContent = 'Tirer 4 Jeux';
        }
}

showEmptyCards();
initGameSearch();
document.getElementById('drawBtn').addEventListener('click', drawGames);
        </script>
