
<!DOCTYPE html>
<html lang="fr">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tirage Aléatoire de Jeux</title>
        <style>
                * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                }
                
                body {
                        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        min-height: 100vh;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        padding: 20px;
                }
                
                .container {
                        text-align: center;
                        background: white;
                        padding: 40px 20px;
                        border-radius: 15px;
                        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
                        max-width: 600px;
                        width: 100%;
                }
                
                h1 {
                        color: #333;
                        margin-bottom: 30px;
                        font-size: 2em;
                }
                
                .games-grid {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                        gap: 20px;
                        margin: 30px 0;
                }
                .flip-card {
                        background: transparent;
                        width: 100%;
                        height: 120px;
                        perspective: 700px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                }
                .flip-card-inner {
                        position: relative;
                        width: 100%;
                        height: 100%;
                        transition: transform 0.6s cubic-bezier(.4,2,.6,1);
                        transform-style: preserve-3d;
                }
                .flip-card.flipped .flip-card-inner {
                        transform: rotateY(180deg);
                }
                .flip-card-front, .flip-card-back {
                        position: absolute;
                        width: 100%;
                        height: 100%;
                        backface-visibility: hidden;
                        border-radius: 10px;
                        top: 0;
                        left: 0;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                }
                .flip-card-front {
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        font-size: 1.2em;
                        font-weight: bold;
                        letter-spacing: 0.5px;
                        text-align: center;
                }
                .flip-card-back {
                        background: white;
                        color: #333;
                        font-size: 1.1em;
                        font-weight: bold;
                        text-align: center;
                        transform: rotateY(180deg);
                        padding: 0 8px;
                        transition: background 0.4s;
                }
                .flip-card-back.red {
                        background: linear-gradient(135deg, #e74c3c 0%, #ff7675 100%);
                        color: white;
                }
                .flip-card-back.yellow {
                        background: linear-gradient(135deg, #f1c40f 0%, #ffeaa7 100%);
                        color: #333;
                }
                .flip-card-back.green {
                        background: linear-gradient(135deg, #27ae60 0%, #81ecec 100%);
                        color: white;
                }
                
                button {
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        border: none;
                        padding: 15px 40px;
                        font-size: 1.1em;
                        border-radius: 50px;
                        cursor: pointer;
                        transition: transform 0.2s ease;
                        font-weight: bold;
                }
                
                button:hover {
                        transform: scale(1.05);
                }
                
                button:active {
                        transform: scale(0.95);
                }
                
                @media (max-width: 600px) {
                        .container {
                                padding: 20px;
                        }
                        
                        h1 {
                                font-size: 1.5em;
                        }
                        
                        .games-grid {
                                grid-template-columns: 1fr;
                        }
                }
        </style>
</head>
<body>
        <div class="container">
                <h1>🎮 Tirage Aléatoire</h1>
                <div class="games-grid" id="gamesContainer"></div>
                <button id="drawBtn">Tirer 3 Jeux</button>
        </div>
        
        <script>
                // Remplace tout le bloc const games = [...] par ce code :

const gamesRaw = [
        // ACTION
        // Action aventure
        'Uncharted 4',
        'Uncharted the lost legacy',
        'God of war ragnarok',
        'A plage tale: innocence',
        // Monde ouvert
        'Red dead redemption 2',
        'Horizon forbidden west',
        'Ghost of tsushima',
        'Sleeping dog',
        'Spider man',
        'Far cry 3',
        // Survival Horror
        'Last of us',
        'Last of us 2',
        'resident evil 4',
        'resident evil 5',
        'resident evil 6',
        'resident evil 7',
        'resident evil village',
        // RPG AU SENS LARGE
        // Jrpg
        'Personna 3',
        'Personna 4',
        'Personna 5',
        'Tales of berseria',
        'Tales of vesperia',
        'Tales of arise',
        'Tales of grace f',
        'World of FF',
        // Trpg
        'Solasta',
        'Pillards of eternity 2',
        'Baldurs gate 3',
        'divinity 2',
        'warhammer 40000 rogue trader',
        // Arpg
        'hogwarts Legacy',
        'Niear replicant',
        'Cyberpunk',
        'Mass effect 1',
        'Mass effect 2',
        'Mass effect 3',
        'La terre du millieu, l`ombre de la guerre',
        'La terre du millieu, l`ombre du mordor',
        'Assassin creed origin',
        'Assassin creed odyssey',
        'Dragon age',
        'Monster hunter',
        // DarkSouls like
        'Dark soul 3',
        'Nioh2',
        'BloodBorne',
        'Seikiro',
        'Elden ring',
        'Lie of P',
        'Mortal shell',
        'Lord of the fallen',
        // Hack'n'slash
        'Diablo 3',
        'Diablo 4',
        'Path of exile', 
        // Beat them all
        'Devil may cry',
        'Bayonetta',
        'Ades',
        // AVENTURE
        // Point'n click
        'goblins 1',
        'goblins 2',
        'goblins 3',
        'grim fandango',
        'legend of kyrandia 1',
        'legend of kyrandia 2',
        'legend of kyrandia 3',
        'machinarium',
        'stasis',
        'monkey island 4',
        'monkey island 5',
        'monkey island 6',
        'Walkig dead',
        'full throttle',
        'Runaway 1',
        'Runaway 2',
        'Runaway 3',
        'sam & max  1 2 3',
        //Plate-forme
        'Rayman',
        'Cuphead',
        // STRATEGIE & TACTIQUE
        'Starcraft',
        'Ancestors',
        'Unicorn overlord',
        'Valkyrie chronicle',
        'Valkyrie chronicle 4',
        // FPS
        'Doom',
];

// On va parser la liste pour associer chaque jeu à son genre
const games = [];
let currentGenre = '';
let currentSubGenre = '';

gamesRaw.forEach(line => {
    const trimmed = line.trim();
    if (trimmed.startsWith('//')) {
        // C'est un commentaire, on met à jour le genre ou sous-genre
        const genreText = trimmed.replace('//', '').trim();
        // Si le commentaire contient "ACTION", "RPG", etc. on considère que c'est un genre principal
        if (
            genreText.toUpperCase().includes('ACTION') ||
            genreText.toUpperCase().includes('RPG') ||
            genreText.toUpperCase().includes('AVENTURE') ||
            genreText.toUpperCase().includes('STRATEGIE') ||
            genreText.toUpperCase().includes('FPS')
        ) {
            currentGenre = genreText;
            currentSubGenre = '';
        } else {
            currentSubGenre = genreText;
        }
    } else if (trimmed.length > 0) {
        games.push({
            name: trimmed,
            genre: currentGenre,
            subGenre: currentSubGenre
        });
    }
});
                
let flipped = false;

function showEmptyCards() {
        const container = document.getElementById('gamesContainer');
        container.innerHTML = '';
        for (let i = 0; i < 3; i++) {
                container.innerHTML += `
                        <div class="flip-card" id="flipCard${i}">
                                <div class="flip-card-inner">
                                        <div class="flip-card-front">?</div>
                                        <div class="flip-card-back"></div>
                                </div>
                        </div>
                `;
        }
}

function drawGames() {
        if (!flipped) {
                // Tirage et affichage
                const selected = [];
                const gamesCopy = [...games];
                for (let i = 0; i < 3; i++) {
                        const randomIndex = Math.floor(Math.random() * gamesCopy.length);
                        selected.push(gamesCopy[randomIndex]);
                        gamesCopy.splice(randomIndex, 1);
                }
                // Couleurs à attribuer
                const colors = ['red', 'yellow', 'green'];
                // Mélange aléatoire
                for (let i = colors.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [colors[i], colors[j]] = [colors[j], colors[i]];
                }
                for (let i = 0; i < 3; i++) {
                        const card = document.getElementById('flipCard'+i);
                        if (card) {
                                card.classList.add('flipped');
                                const back = card.querySelector('.flip-card-back');
                                back.className = 'flip-card-back ' + colors[i];
                                back.innerHTML = `
                                        <div>${selected[i].name}</div>
                                        <div style="font-size:0.9em;font-weight:normal;margin-top:6px;">
                                                <em>${selected[i].genre}${selected[i].subGenre ? ' - ' + selected[i].subGenre : ''}</em>
                                        </div>
                                `;
                        }
                }
                flipped = true;
                document.getElementById('drawBtn').textContent = 'Réinitialiser';
        } else {
                // Réinitialise
                for (let i = 0; i < 3; i++) {
                        const card = document.getElementById('flipCard'+i);
                        if (card) {
                                card.classList.remove('flipped');
                                const back = card.querySelector('.flip-card-back');
                                back.className = 'flip-card-back';
                                back.innerHTML = '';
                        }
                }
                flipped = false;
                document.getElementById('drawBtn').textContent = 'Tirer 3 Jeux';
        }
}

showEmptyCards();
document.getElementById('drawBtn').addEventListener('click', drawGames);
        </script>
</body>
</html>
`;
