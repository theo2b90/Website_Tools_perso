<!DOCTYPE html>
<!-- This HTML file reads/writes to parfums_fragrantica.json in the same directory -->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Collection de Parfums</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .form-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .perfumes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .perfume-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            color: #333;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .perfume-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .perfume-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 8px;
            color: #667eea;
        }
        .perfume-brand {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 10px;
        }
        .loading {
            color: #999;
            font-size: 0.85em;
            font-style: italic;
        }
        .error {
            color: #e74c3c;
        }
        .remove-btn {
            width: 100%;
            margin-top: 15px;
            background: #e74c3c;
            font-size: 0.9em;
            padding: 8px;
        }
        .remove-btn:hover {
            background: #c0392b;
        }
        .empty-state {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧴 Ma Collection de Parfums</h1>
        
        <div class="form-section">
            <div class="form-group">
                <input type="text" id="perfumeName" placeholder="Nom du parfum (ex: Bleu de Chanel)">
                <input type="text" id="perfumeBrand" placeholder="Marque (optionnel)">
                <button onclick="addPerfume()">Ajouter</button>
            </div>
        </div>

        <div id="perfumesContainer" class="perfumes-grid"></div>
        <div id="emptyState" class="empty-state">Aucun parfum ajouté pour le moment</div>
    </div>

    <script>
        let perfumes = JSON.parse(localStorage.getItem('perfumes')) || [];

        async function searchPerfume(name, brand = '') {
            try {
                const searchQuery = brand ? `${name} ${brand}` : name;
                const response = await fetch(`https://www.fragrantica.com/search/?query=${encodeURIComponent(searchQuery)}`);
                const html = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const firstLink = doc.querySelector('a.toListItem');
                
                if (firstLink && firstLink.href) {
                    return firstLink.href;
                }
                return `https://www.fragrantica.com/search/?query=${encodeURIComponent(searchQuery)}`;
            } catch (error) {
                return `https://www.fragrantica.com/search/?query=${encodeURIComponent(name)}`;
            }
        }

        async function addPerfume() {
            const nameInput = document.getElementById('perfumeName');
            const brandInput = document.getElementById('perfumeBrand');
            const name = nameInput.value.trim();
            const brand = brandInput.value.trim();

            if (!name) {
                alert('Veuillez entrer un nom de parfum');
                return;
            }

            const perfume = {
                id: Date.now(),
                name: name,
                brand: brand,
                url: null,
                searching: true
            };

            perfumes.push(perfume);
            savePerfumes();
            renderPerfumes();

            const url = await searchPerfume(name, brand);
            perfume.url = url;
            perfume.searching = false;
            savePerfumes();
            renderPerfumes();

            nameInput.value = '';
            brandInput.value = '';
        }

        function removePerfume(id) {
            perfumes = perfumes.filter(p => p.id !== id);
            savePerfumes();
            renderPerfumes();
        }

        function savePerfumes() {
            localStorage.setItem('perfumes', JSON.stringify(perfumes));
        }

        function renderPerfumes() {
            const container = document.getElementById('perfumesContainer');
            const emptyState = document.getElementById('emptyState');

            if (perfumes.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = perfumes.map(perfume => {
                const content = `
                    <div class="perfume-name">${perfume.name}</div>
                    ${perfume.brand ? `<div class="perfume-brand">${perfume.brand}</div>` : ''}
                    ${perfume.searching ? '<div class="loading">Recherche en cours...</div>' : '<div style="color: #27ae60; font-size: 0.9em;">✓ Lien trouvé</div>'}
                    <button class="remove-btn" onclick="removePerfume(${perfume.id})">Supprimer</button>
                `;

                if (perfume.url && !perfume.searching) {
                    return `<a href="${perfume.url}" target="_blank" class="perfume-card" onclick="if(event.target.classList.contains('remove-btn')) { event.preventDefault(); removePerfume(${perfume.id}); }">${content}</a>`;
                } else {
                    return `<div class="perfume-card">${content}</div>`;
                }
            }).join('');
        }

        document.getElementById('perfumeName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addPerfume();
        });

        renderPerfumes();
    </script>
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
        <button onclick="exportPerfumes()" style="background: #27ae60;">📥 Exporter en JSON</button>
        <button onclick="importPerfumes()" style="background: #3498db;">📤 Importer JSON</button>
    </div>
    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <script>
    function exportPerfumes() {
        const dataStr = JSON.stringify(perfumes, null, 2);
        const dataBlob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `parfums_${new Date().toISOString().split('T')[0]}.json`;
        link.click();
        URL.revokeObjectURL(url);
    }

    function importPerfumes() {
        document.getElementById('fileInput').click();
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    if (Array.isArray(imported)) {
                        perfumes = imported;
                        savePerfumes();
                        renderPerfumes();
                        alert('Parfums importés avec succès!');
                    }
                } catch (error) {
                    alert('Erreur: fichier JSON invalide');
                }
            };
            reader.readAsText(file);
        }
    });
    </script>
    
</body>
</html>
